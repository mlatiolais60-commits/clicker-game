<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>God Mode Clicker</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color:white;
  text-align:center;
  overflow:hidden;
}

.title {
  font-size:26px;
  margin-top:15px;
  font-weight:bold;
  text-shadow:0 0 10px #fff, 0 0 20px #00f;
}

#coin {
  font-size:90px;
  margin:10px;
}

/* 💎 3D BUTTON SYSTEM (ALL BUTTONS) */
button {
  padding:12px 14px;
  margin:6px;
  font-size:13px;
  border-radius:14px;
  border:none;
  color:white;

  background: linear-gradient(145deg, #2b2b2b, #141414);

  box-shadow:
    6px 6px 12px rgba(0,0,0,0.6),
    -4px -4px 10px rgba(255,255,255,0.05),
    inset 0 0 0 rgba(255,255,255,0);

  transform: translateY(0px);
  transition: all 0.12s ease;
  cursor:pointer;

  text-shadow:0 1px 2px rgba(0,0,0,0.8);
}

/* 🔥 PRESS EFFECT */
button:active {
  transform: translateY(4px) scale(0.98);
  box-shadow:
    2px 2px 6px rgba(0,0,0,0.7),
    inset 2px 2px 6px rgba(0,0,0,0.5);
}

/* 🌌 LAYOUT */
.panel { margin-top:10px; }

.float {
  position:absolute;
  animation: floatUp 1s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity:1; }
  to { transform: translateY(-120px); opacity:0; }
}
</style>
</head>

<body>

<div class="title">👑 Matthew’s Idle Clicker — GOD MODE</div>

<div id="coin">💰</div>

<h2 id="score">0</h2>
<h3 id="gems">💎 0</h3>

<div class="panel">
<button onclick="tap()">TAP</button>
<button onclick="slot()">🎰 SLOT</button>
<button onclick="bossHit()">🔥 BOSS</button>
</div>

<div class="panel">
<button onclick="upgrade('click')">Click+</button>
<button onclick="upgrade('multi')">Multi+</button>
<button onclick="upgrade('crit')">Crit+</button>
<button onclick="upgrade('auto')">Auto+</button>
</div>

<div class="panel">
<button onclick="prestige()">✨ REBIRTH</button>
<button onclick="theme()">🎨 Theme</button>
</div>

<script>

/* 💾 SAVE SYSTEM */
let S = JSON.parse(localStorage.getItem("GODMODE")) || {
  score:0,
  gems:0,
  click:1,
  multi:1,
  crit:0.1,
  auto:0,
  rebirth:0,
  themes:0
};

let boss = {hp:1000,max:1000,active:false};

/* ✨ FLOAT TEXT */
function float(t){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=t;
  e.style.left=(window.innerWidth/2+(Math.random()*60-30))+"px";
  e.style.top="200px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),800);
}

/* 🎮 TAP */
function tap(){
  let gain = S.click * S.multi;

  if(Math.random() < S.crit){
    gain *= 5;
    float("💥 CRIT "+gain);
  } else {
    float("+"+gain);
  }

  S.score += gain;

  if(Math.random()<0.02){
    S.gems++;
    float("💎 GEM!");
  }

  save(); update();
}

/* 🎰 SLOT */
function slot(){
  let r=Math.random();

  if(r>0.97){
    S.gems+=10;
    float("🟣 JACKPOT!");
  }
  else if(r>0.7){
    S.score+=1000;
    float("🟢 WIN +1000");
  }
  else {
    S.score-=100;
    float("🔴 LOSE -100");
  }

  save(); update();
}

/* 🔥 BOSS */
function bossHit(){
  if(!boss.active){
    boss.hp=boss.max;
    boss.active=true;
  }

  let dmg=S.click*S.multi*2;
  boss.hp-=dmg;

  float("⚔️ "+dmg);

  if(boss.hp<=0){
    S.gems+=5;
    S.score+=2000;
    float("🏆 BOSS DOWN!");
    boss.active=false;
  }

  save(); update();
}

/* ⬆️ UPGRADE */
function upgrade(type){
  let cost=100;
  if(S.score<cost) return;

  S.score-=cost;

  if(type==="click") S.click++;
  if(type==="multi") S.multi+=0.5;
  if(type==="crit") S.crit+=0.02;
  if(type==="auto") S.auto++;

  float("⬆️ UPGRADED");

  save(); update();
}

/* ✨ REBIRTH */
function prestige(){
  if(S.score<5000) return;

  S.score=0;
  S.click=1;
  S.auto=0;
  S.multi+=1;
  S.rebirth++;

  float("✨ REBIRTH!");

  save(); update();
}

/* 🎨 THEMES */
function theme(){
  S.themes++;
  document.body.style.background =
    S.themes%2 ?
    "radial-gradient(circle at top,#111,#000)" :
    "radial-gradient(circle at top,#001,#000)";
  save();
}

/* 🔁 LOOP */
setInterval(()=>{
  S.score += S.auto * S.multi;
  update();
},1000);

/* 📊 UI */
function update(){
  document.getElementById("score").innerText=Math.floor(S.score);
  document.getElementById("gems").innerText="💎 "+S.gems;
}

/* 💾 SAVE */
function save(){
  localStorage.setItem("GODMODE", JSON.stringify(S));
}

update();

</script>

</body>
</html>
