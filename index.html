<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matthew's Idle Clicker Game</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body {
  margin:0;
  font-family:'Orbitron', sans-serif;
  background:#000;
  color:white;
  overflow:hidden;
}

/* 🌌 animated background */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,200,255,0.2), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,0,150,0.15), transparent 40%);
  animation: move 8s infinite alternate;
}

@keyframes move {
  from { transform:scale(1); }
  to { transform:scale(1.2); }
}

/* 📱 APP LAYOUT */
.screen {
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.active {
  display:flex;
}

/* 👑 TITLE */
.title {
  font-size:20px;
  margin-bottom:10px;
  text-shadow:0 0 10px cyan;
}

/* 💰 COIN */
#coin {
  font-size:110px;
  filter:drop-shadow(0 0 15px gold);
  transition:0.1s;
}
#coin:active { transform:scale(0.92); }

/* 📊 UI */
.stat {
  margin:5px;
  opacity:0.9;
}

/* 🔘 BUTTONS (App Store style) */
button {
  padding:12px 14px;
  margin:6px;
  border:none;
  border-radius:14px;
  color:white;

  background: linear-gradient(145deg,#2b2b2b,#111);

  box-shadow:0 5px 15px rgba(0,0,0,0.7);
}

button:active {
  transform:translateY(3px);
}

/* 📱 NAV BAR */
.nav {
  position:absolute;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(20,20,20,0.8);
  padding:10px;
  backdrop-filter: blur(10px);
}

.nav button {
  flex:1;
  margin:2px;
  font-size:11px;
}

/* 💥 FLOAT */
.float {
  position:absolute;
  animation: floatUp 1s forwards;
}
@keyframes floatUp {
  from{opacity:1;transform:translateY(0);}
  to{opacity:0;transform:translateY(-120px);}
}

/* 📦 PANELS */
.panel {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  max-width:400px;
}
</style>
</head>

<body>

<!-- 🏠 HOME -->
<div id="home" class="screen active">
  <div class="title">👑 Matthew's Idle Clicker</div>
  <button onclick="switchScreen('game')">▶ PLAY</button>
  <button onclick="switchScreen('shop')">🛒 SHOP</button>
  <button onclick="switchScreen('ach')">🏆 ACHIEVEMENTS</button>
</div>

<!-- 🎮 GAME -->
<div id="game" class="screen">
  <div class="title">GAME</div>

  <div id="coin">💰</div>
  <h2 id="score">0</h2>

  <div class="stat" id="stats"></div>

  <div class="panel">
    <button onclick="tap()">TAP</button>
    <button onclick="crit()">CRIT</button>
    <button onclick="boss()">BOSS</button>
  </div>
</div>

<!-- 🛒 SHOP -->
<div id="shop" class="screen">
  <div class="title">SHOP</div>

  <button onclick="buy('click')">Click +</button>
  <button onclick="buy('multi')">Multiplier</button>
  <button onclick="buy('auto')">Auto</button>
  <button onclick="rebirth()">REBIRTH</button>
</div>

<!-- 🏆 ACHIEVEMENTS -->
<div id="ach" class="screen">
  <div class="title">ACHIEVEMENTS</div>
  <div id="achievements"></div>
</div>

<!-- 📱 NAV -->
<div class="nav">
  <button onclick="switchScreen('home')">Home</button>
  <button onclick="switchScreen('game')">Game</button>
  <button onclick="switchScreen('shop')">Shop</button>
  <button onclick="switchScreen('ach')">Stats</button>
</div>

<script>

let S = JSON.parse(localStorage.getItem("ULTRA_GAME")) || {
  score:0,
  click:1,
  multi:1,
  auto:0,
  rebirth:0
};

/* 📲 NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* 💾 SAVE */
function save(){
  localStorage.setItem("ULTRA_GAME", JSON.stringify(S));
}

/* 💥 FLOAT TEXT */
function float(t){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=t;
  e.style.left=(window.innerWidth/2+(Math.random()*50-25))+"px";
  e.style.top="200px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

/* 🎮 TAP */
function tap(){
  let gain=S.click*S.multi;
  S.score+=gain;
  float("+"+gain);
  save(); update();
}

/* 💥 CRIT */
function crit(){
  let gain=S.click*S.multi*5;
  S.score+=gain;
  float("💥 CRIT "+gain);
  save(); update();
}

/* 🔥 BOSS */
function boss(){
  let gain=S.click*S.multi*10;
  S.score+=gain;
  float("BOSS +"+gain);
  save(); update();
}

/* 🛒 SHOP */
function buy(type){
  let cost=100;
  if(S.score<cost) return;

  S.score-=cost;

  if(type==="click") S.click++;
  if(type==="multi") S.multi+=0.5;
  if(type==="auto") S.auto++;

  float("UPGRADED");
  save(); update();
}

/* ✨ REBIRTH */
function rebirth(){
  if(S.score<5000) return;

  S.score=0;
  S.click=1;
  S.multi+=1;
  S.auto=0;
  S.rebirth++;

  float("REBIRTH!");
  save(); update();
}

/* 🔁 LOOP */
setInterval(()=>{
  S.score += S.auto*S.multi;
  update();
},1000);

/* 📊 UI */
function update(){
  document.getElementById("score").innerText=Math.floor(S.score);

  document.getElementById("stats").innerText =
    `Click:${S.click} Multi:${S.multi} Auto:${S.auto} Rebirth:${S.rebirth}`;

  let ach="";
  if(S.score>1000) ach+="💰 Rich ";
  if(S.rebirth>2) ach+="👑 Ascended ";
  document.getElementById("achievements").innerText=ach;
}

update();

</script>

</body>
</html>
