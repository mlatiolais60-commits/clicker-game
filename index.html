<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matthew's Idle Clicker</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🌌 BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,255,0.15), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,0,150,0.12), transparent 40%);
}

/* 🎬 INTRO */
#intro {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  background:black;
}

#title {
  font-size:22px;
  text-shadow:0 0 15px cyan;
}

#tapStart {
  margin-top:10px;
  opacity:0.7;
}

/* 🎮 GAME */
#game {
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#coin { font-size:100px; }

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

/* 💥 FLOAT TEXT */
.float {
  position:absolute;
  animation: floatUp 1s forwards;
}
@keyframes floatUp {
  from {opacity:1; transform:translateY(0);}
  to {opacity:0; transform:translateY(-120px);}
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div id="title">👑 Matthew's Idle Clicker Game</div>
  <div id="tapStart">👆 Tap anywhere to start</div>
</div>

<!-- 🎮 GAME -->
<div id="game">

  <div id="coin">💰</div>
  <h2 id="score">0</h2>

  <button id="tapBtn">TAP</button>
  <button id="critBtn">CRIT</button>
  <button id="slotBtn">SLOT</button>
  <button id="bossBtn">BOSS</button>

</div>

<script>

/* 🧠 GAME STATE */
let S = {
  score:0,
  click:1,
  multi:1,
  auto:0,
  started:false
};

/* 🚀 START GAME (SAFE - NO CONFLICTS) */
function startGame(){
  if(S.started) return;
  S.started = true;

  document.getElementById("intro").style.display="none";
  document.getElementById("game").style.display="flex";

  console.log("Game Started");
}

/* 👆 ONLY INTRO LISTENER (DO NOT BLOCK BUTTONS) */
document.getElementById("intro").addEventListener("pointerdown", startGame);

/* 💥 FLOAT TEXT */
function float(t){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=t;
  e.style.left=(window.innerWidth/2)+"px";
  e.style.top="200px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

/* 🎮 GAME FUNCTIONS */
function tap(){
  S.score += S.click*S.multi;
  float("+"+(S.click*S.multi));
  update();
}

function crit(){
  S.score += S.click*S.multi*5;
  float("💥 CRIT");
  update();
}

function slot(){
  let r=Math.random();
  if(r>0.9){S.score+=1000;float("JACKPOT!");}
  else if(r>0.5){S.score+=200;float("+200");}
  else {S.score-=100;float("-100");}
  update();
}

function boss(){
  S.score += S.click*S.multi*10;
  float("BOSS HIT");
  update();
}

/* 📊 UI */
function update(){
  document.getElementById("score").innerText=Math.floor(S.score);
}

/* 🔁 BUTTON WIRING (IMPORTANT FIX) */
document.getElementById("tapBtn").onclick = tap;
document.getElementById("critBtn").onclick = crit;
document.getElementById("slotBtn").onclick = slot;
document.getElementById("bossBtn").onclick = boss;

/* ⏱ IDLE */
setInterval(()=>{
  S.score += S.auto*S.multi;
  update();
},1000);

update();

</script>

</body>
</html>
