<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matthew's Idle Clicker</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🌌 background */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 30%, rgba(0,255,255,0.15), transparent 40%),
              radial-gradient(circle at 70% 70%, rgba(255,0,150,0.12), transparent 40%);
}

/* 🎬 INTRO */
#intro {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

#title {
  font-size:22px;
  text-align:center;
  text-shadow:0 0 15px cyan;
}

/* 🎮 GAME */
#game {
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.active {display:flex;}

#coin {
  font-size:100px;
}

button {
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

/* 💥 FLOAT */
.float {
  position:absolute;
  animation: floatUp 1s forwards;
}
@keyframes floatUp {
  from{opacity:1;transform:translateY(0);}
  to{opacity:0;transform:translateY(-120px);}
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div id="title">👑 Matthew's Idle Clicker Game</div>
  <p>👆 Tap anywhere to play</p>
</div>

<!-- 🎮 GAME -->
<div id="game">

  <div id="coin">💰</div>
  <h2 id="score">0</h2>

  <button onclick="tap()">TAP</button>
  <button onclick="crit()">CRIT</button>
  <button onclick="slot()">SLOT</button>
  <button onclick="boss()">BOSS</button>

</div>

<script>

let S = {
  score:0,
  click:1,
  multi:1,
  auto:0
};

/* 🚀 SAFE START (FIXED FOR iOS) */
function startGame(){
  document.getElementById("intro").style.display="none";
  document.getElementById("game").style.display="flex";
}

/* 👆 MULTI-INPUT SUPPORT */
document.addEventListener("click", startGame, { once:true });
document.addEventListener("touchstart", startGame, { once:true });

/* 💥 FLOAT */
function float(t){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=t;
  e.style.left=(window.innerWidth/2)+"px";
  e.style.top="200px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

/* 🎮 FUNCTIONS */
function tap(){
  let g=S.click*S.multi;
  S.score+=g;
  float("+"+g);
  update();
}

function crit(){
  let g=S.click*S.multi*5;
  S.score+=g;
  float("💥 "+g);
  update();
}

function slot(){
  let r=Math.random();
  if(r>0.9){S.score+=1000;float("JACKPOT!");}
  else if(r>0.5){S.score+=200;float("+200");}
  else {S.score-=100;float("-100");}
  update();
}

function boss(){
  let g=S.click*S.multi*10;
  S.score+=g;
  float("BOSS "+g);
  update();
}

/* 📊 UI */
function update(){
  document.getElementById("score").innerText=Math.floor(S.score);
}

setInterval(()=>{
  S.score+=S.auto*S.multi;
  update();
},1000);

update();

</script>

</body>
</html>
