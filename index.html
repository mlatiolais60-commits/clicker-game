<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matthew's Idle Clicker</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

body {
  margin:0;
  font-family:Orbitron, sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🌌 BACKGROUND GLOW */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,255,0.15), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,0,150,0.12), transparent 45%);
  animation: bg 6s infinite alternate;
}

@keyframes bg {
  from { transform:scale(1); }
  to { transform:scale(1.2); }
}

/* 🎬 INTRO SCREEN */
#intro {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

/* 🧠 TITLE LETTERS */
.letter {
  display:inline-block;
  font-size:28px;
  opacity:0;
  transform:translateY(-60px) rotateX(90deg);
  animation: drop 0.6s forwards;
  text-shadow:0 0 15px cyan;
}

@keyframes drop {
  to {
    opacity:1;
    transform:translateY(0) rotateX(0);
  }
}

/* 👆 TAP TO START */
#tap {
  margin-top:20px;
  opacity:0;
  animation: fadeIn 2s forwards;
  animation-delay:2s;
}

@keyframes fadeIn {
  to { opacity:1; }
}

/* 🎮 GAME */
.screen {
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.active { display:flex; }

/* 💰 COIN */
#coin {
  font-size:110px;
  filter:drop-shadow(0 0 15px gold);
  transition:0.1s;
}
#coin:active { transform:scale(0.9); }

/* 🔘 BUTTONS */
button {
  padding:12px 14px;
  margin:6px;
  border:none;
  border-radius:14px;
  color:white;
  background:linear-gradient(145deg,#2b2b2b,#111);
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
  transition:0.1s;
}
button:active { transform:translateY(4px); }

/* 💥 FLOAT */
.float {
  position:absolute;
  animation: floatUp 1s forwards;
}
@keyframes floatUp {
  from {opacity:1;transform:translateY(0);}
  to {opacity:0;transform:translateY(-120px);}
}

/* 🔥 SHAKE */
@keyframes shake {
  0%{transform:translate(0);}
  25%{transform:translate(-5px,5px);}
  50%{transform:translate(5px,-5px);}
  75%{transform:translate(-5px,5px);}
  100%{transform:translate(0);}
}

.shake { animation:shake 0.2s; }
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div id="title"></div>
  <div id="tap">👆 Tap anywhere to play</div>
</div>

<!-- 🎮 GAME -->
<div id="game" class="screen">
  <div>👑 Matthew’s Clicker</div>

  <div id="coin">💰</div>
  <h2 id="score">0</h2>

  <button onclick="tap()">TAP</button>
  <button onclick="crit()">CRIT</button>
  <button onclick="boss()">BOSS</button>
</div>

<script>

let S = JSON.parse(localStorage.getItem("ULTIMATE")) || {
  score:0,
  click:1,
  multi:1,
  auto:0
};

/* 🔊 SOUND ENGINE */
function sound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.connect(ctx.destination);

  if(type==="click") o.frequency.value=300;
  if(type==="crit") o.frequency.value=600;
  if(type==="boss") o.frequency.value=120;

  o.start();
  o.stop(ctx.currentTime+0.1);
}

/* 🎬 CINEMATIC TITLE */
let name="MATTHEW'S IDLE CLICKER GAME";
let i=0;
let title=document.getElementById("title");

function buildTitle(){
  if(i<name.length){
    let span=document.createElement("span");
    span.className="letter";
    span.style.animationDelay=(i*0.08)+"s";
    span.innerText=name[i];
    title.appendChild(span);
    i++;
    setTimeout(buildTitle,80);
  }
}
buildTitle();

/* 👆 START GAME */
document.body.addEventListener("click", start);

function start(){
  document.getElementById("intro").style.display="none";
  document.getElementById("game").classList.add("active");
  document.body.removeEventListener("click", start);
}

/* 💥 FLOAT */
function float(t){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=t;
  e.style.left=(window.innerWidth/2)+"px";
  e.style.top="200px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

/* 🎮 TAP */
function tap(){
  let gain=S.click*S.multi;
  S.score+=gain;
  float("+"+gain);
  sound("click");
  save(); update();
}

/* 💥 CRIT */
function crit(){
  let gain=S.click*S.multi*5;
  S.score+=gain;
  float("💥 CRIT "+gain);
  sound("crit");
  screenShake();
  save(); update();
}

/* 🔥 BOSS */
function boss(){
  let gain=S.click*S.multi*10;
  S.score+=gain;
  float("BOSS "+gain);
  sound("boss");
  screenShake();
  save(); update();
}

/* 📳 SHAKE */
function screenShake(){
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),200);
}

/* 💾 SAVE */
function save(){
  localStorage.setItem("ULTIMATE", JSON.stringify(S));
}

/* 📊 UI */
function update(){
  document.getElementById("score").innerText=Math.floor(S.score);
}

setInterval(()=>{
  S.score += S.auto*S.multi;
  update();
},1000);

update();

</script>

</body>
</html>
