<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Matthew Clicker</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* 💰 coin tap animation */
#coin{
  font-size:100px;
  display:inline-block;
  transition:transform 0.08s ease;
}

#coin.tap{
  transform:scale(0.85) rotate(-5deg);
}

/* 🎮 buttons */
button{
  padding:14px;
  margin:8px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#222;
  color:white;
  transition:transform 0.08s ease;
}

button:active{
  transform:scale(0.92);
}

/* 💥 float text */
.float{
  position:absolute;
  font-size:16px;
  animation:up 1s forwards;
}

@keyframes up{
  from{opacity:1;transform:translateY(0);}
  to{opacity:0;transform:translateY(-120px);}
}

/* layout */
#wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div id="wrap">

  <h1>💰 <span id="score">0</span></h1>

  <div id="coin">💰</div>

  <div>
    <button id="tapBtn">TAP</button>
    <button id="critBtn">CRIT</button>
    <button id="slotBtn">SLOT</button>
    <button id="bossBtn">BOSS</button>
  </div>

</div>

<script>

let score = 0;

/* 💥 FLOAT TEXT */
function float(txt){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=txt;
  e.style.left=(window.innerWidth/2)+"px";
  e.style.top="200px";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),900);
}

/* 💰 TAP ANIMATION */
function animateCoin(){
  let coin=document.getElementById("coin");
  coin.classList.add("tap");
  setTimeout(()=>coin.classList.remove("tap"),100);
}

/* 🎮 ACTIONS */
function tap(){
  animateCoin();
  score += 1;
  float("+1");
  update();
}

function crit(){
  animateCoin();
  score += 10;
  float("💥 +10");
  update();
}

function slot(){
  animateCoin();
  let r=Math.random();
  if(r>0.7){
    score += 50;
    float("WIN +50");
  }else{
    score -= 10;
    float("LOSE -10");
  }
  update();
}

function boss(){
  animateCoin();
  score += 100;
  float("BOSS +100");
  update();
}

/* 📊 UPDATE */
function update(){
  document.getElementById("score").innerText = score;
}

/* 🔗 BUTTON FIX (IMPORTANT) */
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("tapBtn").onclick = tap;
  document.getElementById("critBtn").onclick = crit;
  document.getElementById("slotBtn").onclick = slot;
  document.getElementById("bossBtn").onclick = boss;
});

</script>

</body>
</html>
